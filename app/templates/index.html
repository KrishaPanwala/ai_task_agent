<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Reminder Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7c7cff">
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <div>
            <h1>🤖 AI Reminder Bot</h1>
            <p class="subtitle">Type naturally — AI will handle the rest</p>
        </div>
        <div class="header-actions">
            <span id="welcomeUser" class="welcome-text"></span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </div>

    <!-- Chat ID Warning -->
    <div id="chatIdWarning" class="warning-box" style="display:none">
        ⚠️ Your Telegram Chat ID is not set!
        <input type="text" id="chatIdInput" placeholder="Enter your Telegram Chat ID">
        <button onclick="saveChatId()">Save</button>
        <small>Send /start to your bot → it will show your Chat ID</small>
    </div>

    <!-- Input Box -->
    <div class="input-box">
        <input type="text" id="taskInput"
            placeholder="Remind me to wakeup every day at 8am"
            onkeypress="if(event.key==='Enter') addTask()">
        <button onclick="addTask()" id="addBtn">
            <span id="btnText">➕ Add Reminder</span>
        </button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <span id="totalCount">0</span>
            <label>Total</label>
        </div>
        <div class="stat-card upcoming">
            <span id="upcomingCount">0</span>
            <label>Upcoming</label>
        </div>
        <div class="stat-card overdue">
            <span id="overdueCount">0</span>
            <label>Overdue</label>
        </div>
        <div class="stat-card recurring">
            <span id="recurringCount">0</span>
            <label>Recurring</label>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">📋 All Reminders</button>
        <button class="tab-btn" onclick="switchTab('today')">📅 Today</button>
        <button class="tab-btn" onclick="switchTab('weekly')">🗓️ Weekly</button>
    </div>

    <!-- Tab 1: All Reminders -->
    <div id="tab-all" class="tab-content active">
        <div class="section-header">
            <h2>📋 All Reminders</h2>
            <button onclick="loadTasks()" class="refresh-btn">🔄 Refresh</button>
        </div>
        <div id="taskList"></div>
    </div>

    <!-- Tab 2: Today -->
    <div id="tab-today" class="tab-content">
        <div class="section-header">
            <h2 id="todayTitle">📅 Today</h2>
            <button onclick="renderToday()" class="refresh-btn">🔄 Refresh</button>
        </div>
        <div id="todayPlanner"></div>
    </div>

    <!-- Tab 3: Weekly -->
    <div id="tab-weekly" class="tab-content">
        <div class="section-header">
            <h2>🗓️ Weekly Planner</h2>
            <button onclick="renderWeekly()" class="refresh-btn">🔄 Refresh</button>
        </div>
        <div id="weeklyPlanner"></div>
    </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
