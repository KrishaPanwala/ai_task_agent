<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login — AI Reminder Bot</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <h1>🤖 AI Reminder Bot</h1>
            <p>Login to your account</p>
        </div>
        <div id="error-msg" class="error-msg" style="display:none"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button onclick="login()" class="auth-btn" id="loginBtn">Login</button>
        <p class="auth-link">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>
<script>
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("error-msg");
    const btn = document.getElementById("loginBtn");

    if (!username || !password) {
        errorMsg.textContent = "⚠️ Please fill all fields";
        errorMsg.style.display = "block";
        return;
    }

    btn.textContent = "Logging in...";
    btn.disabled = true;

    const form = new FormData();
    form.append("username", username);
    form.append("password", password);

    const res = await fetch("/login", { method: "POST", body: form });
    const data = await res.json();

    if (data.error) {
        errorMsg.textContent = "❌ " + data.error;
        errorMsg.style.display = "block";
        btn.textContent = "Login";
        btn.disabled = false;
    } else {
        window.location.href = "/dashboard";
    }
}

document.addEventListener("keypress", e => {
    if (e.key === "Enter") login();
});
</script>
</body>
</html>
